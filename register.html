<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registrarse - GameReviews</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="nav-left">
        <a href="index.html" class="logo-link">
          <img class="logo" src="imglogo.jpg" alt="logo gamer" />
        </a>
      </div>
      <ul class="nav-links">
        <li><a class="nav-btn" href="index.html">Home</a></li>
        <li><a class="nav-btn" href="login.html">Iniciar sesión</a></li>
        <li><a class="nav-btn" href="register.html">Registrarse</a></li>
      </ul>
    </nav>
  </header>

  <main class="register-page">
    <section class="register-card">
      <h2>Crear cuenta</h2>
      <form action="#" method="POST" class="register-form">
        <label for="name">Nombre</label>
        <input id="name" name="name" type="text" required />

        <label for="email">Correo (Gmail)</label>
        <input id="email" name="email" type="email" required />

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" required />

        <label for="gender">Género</label>
        <select id="gender" name="gender">
          <option value="masculino">Masculino</option>
          <option value="femenino">Femenino</option>
        </select>

        <label for="region">Región</label>
        <input id="region" name="region" type="text" placeholder="Ej: Latinoamérica" />

        <div class="form-actions">
          <button class="primary" type="submit">Registrarse</button>
        </div>
      </form>

      <p class="muted">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>Derechos reservados © 2026</p>
  </footer>
</body>
</html>
